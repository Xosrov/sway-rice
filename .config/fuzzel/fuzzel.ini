font=JetBrainsMono Nerd Font:size=12
dpi-aware=auto
prompt="> "
icon-theme=default
icons-enabled=yes
fields=filename,name,generic
match-mode=fzf
sort-result=yes
match-counter=yes
lines=15
width=30
horizontal-pad=40
vertical-pad=8
inner-pad=0
anchor=center
layer=overlay
exit-on-keyboard-focus-loss=yes

[colors]
background=1e1e2edd
text=cdd6f4ff
prompt=bac2deff
placeholder=7f849cff
input=cdd6f4ff
match=f9e2afff
selection=585b70ff
selection-text=cdd6f4ff
selection-match=f9e2afff
counter=7f849cff
border=f9e2afff

[border]
width=2
radius=4

[dmenu]
mode=text
